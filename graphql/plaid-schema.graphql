}

"""A daily historical balance snapshot."""
type HistoricalBalance {
  date: Date!
  current: Float!
  isoCurrencyCode: String
  unofficialCurrencyCode: String
}

"""Consumer metadata attached to an asset report."""
type AssetReportUser {
  clientUserId: String!
  firstName: String
  middleName: String
  lastName: String
  ssn: String
  phoneNumber: String
  email: String
}

"""A warning produced during asset report generation."""
type AssetReportWarning {
