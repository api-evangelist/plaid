}

"""Currency-denominated income amount."""
type BankIncomeAmount {
  amount: Float!
  isoCurrencyCode: String
  unofficialCurrencyCode: String
}

"""A warning produced during bank income analysis."""
type BankIncomeWarning {
  warningType: String!
  warningCode: String!
