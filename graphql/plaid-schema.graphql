}

"""Employment verification data."""
type Employment {
  accountId: ID
  employerName: String
  title: String
  startDate: Date
  endDate: Date
  city: String
  state: String
  country: String
}

# ─────────────────────────────────────────────
# Assets
# ─────────────────────────────────────────────

"""A Plaid Asset Report summarising financial assets for underwriting."""
type AssetReport {
  assetReportId: ID!
  assetReportToken: String!
