# ─────────────────────────────────────────────
# Error
# ─────────────────────────────────────────────

"""Standardized Plaid error envelope returned on API failures."""
type PlaidError {
  errorType: String!
  errorCode: String!
  errorMessage: String!
  displayMessage: String
  requestId: String
  causes: [JSON]
  status: Int
  documentationUrl: String
  suggestedAction: String
}

# ─────────────────────────────────────────────
# Institution
# ─────────────────────────────────────────────

"""A financial institution supported by Plaid."""
type Institution {
  institutionId: ID!
  name: String!
  products: [String!]!
  countryCodes: [String!]!
  url: String
  primaryColor: String
  logo: String
  routingNumbers: [String!]
  dtcNumbers: [String!]
  oauthInstitution: Boolean
  credentials: [Credential!]
  mfa: [String!]
}

"""A login credential field required by an institution."""
type Credential {
  label: String!
  name: String!
  type: String!
}

"""Search result wrapper for institution queries."""
type InstitutionSearch {
  institutions: [Institution!]!
  total: Int!
}

# ─────────────────────────────────────────────
# Item
# ─────────────────────────────────────────────

"""
A Plaid Item represents a login at a financial institution for one user.
An Item may contain multiple Accounts.
"""
type Item {
  itemId: ID!
  institutionId: String
  webhook: String
  error: PlaidError
  availableProducts: [String!]!
  billedProducts: [String!]!
  products: [String!]
  consentedProducts: [String!]
  consentExpirationTime: DateTime
  updateType: String!
  updatedAt: DateTime
}

# ─────────────────────────────────────────────
# Account
# ─────────────────────────────────────────────

"""A bank or financial account belonging to a Plaid Item."""
type Account {
  accountId: ID!
  itemId: ID!
  balances: AccountBalance!
  mask: String
  name: String!
  officialName: String
  type: AccountType!
  subtype: AccountSubtype
  verificationStatus: VerificationStatus
  persistentAccountId: String
  holders: [IdentityOwner!]
}

"""Real-time and available balance information for an Account."""
type AccountBalance {
  available: Float
  current: Float
  limit: Float
  isoCurrencyCode: String
  unofficialCurrencyCode: String
  lastUpdatedDatetime: DateTime
}

# ─────────────────────────────────────────────
# Tokens
# ─────────────────────────────────────────────

"""A short-lived token used to initialise the Plaid Link UI."""
type LinkToken {
  linkToken: ID!
  expiration: DateTime!
  requestId: String!
}

"""A one-time public token returned by Plaid Link after user completes flow."""
type PublicToken {
  publicToken: String!
}

"""A long-lived access token for a Plaid Item."""
type AccessToken {
  accessToken: String!
  itemId: ID!
  requestId: String!
}

# ─────────────────────────────────────────────
# Identity
# ─────────────────────────────────────────────

"""An owner associated with one or more accounts (KYC identity data)."""
type IdentityOwner {
  names: [String!]!
  phoneNumbers: [IdentityPhoneNumber!]!
  emails: [IdentityEmail!]!
  addresses: [IdentityAddress!]!
}

"""A phone number associated with an identity owner."""
type IdentityPhoneNumber {
  data: String!
  primary: Boolean!
  type: String!
}

"""An email address associated with an identity owner."""
type IdentityEmail {
  data: String!
  primary: Boolean!
  type: String!
}

"""A physical address associated with an identity owner."""
type IdentityAddress {
  data: IdentityAddressData!
  primary: Boolean!
}

"""Structured address fields."""
type IdentityAddressData {
  city: String
  region: String
  street: String
  postalCode: String
  country: String
}

# ─────────────────────────────────────────────
# Transaction
# ─────────────────────────────────────────────

"""A single financial transaction on an account."""
type Transaction {
  transactionId: ID!
  accountId: ID!
  amount: Float!
  isoCurrencyCode: String
  unofficialCurrencyCode: String
  date: Date!
  authorizedDate: Date
  authorizedDatetime: DateTime
  datetime: DateTime
  name: String!
  merchantName: String
  originalDescription: String
  category: [String!]
  categoryId: String
  personalFinanceCategory: PersonalFinanceCategory
  personalFinanceCategoryIconUrl: String
  pending: Boolean!
  pendingTransactionId: String
  accountOwner: String
  transactionCode: TransactionCode
  paymentMeta: PaymentMeta
  paymentChannel: TransactionPaymentChannelType
  location: TransactionLocation
  checkNumber: String
  transactionType: TransactionType
  website: String
  logo: String
  merchantEntityId: String
  counterparties: [Counterparty!]
}

"""Plaid's hierarchical personal-finance category."""
type PersonalFinanceCategory {
  primary: String!
  detailed: String!
  confidenceLevel: String
}

"""Payment metadata extracted from a transaction."""
type PaymentMeta {
  byOrderOf: String
  payee: String
  payer: String
  paymentMethod: String
  paymentProcessor: String
  ppdId: String
  reason: String
  referenceNumber: String
}

"""Geolocation metadata for a transaction."""
type TransactionLocation {
  address: String
  city: String
  region: String
  postalCode: String
  country: String
  lat: Float
  lon: Float
  storeNumber: String
}

"""A counterparty (merchant, payee, etc.) on a transaction."""
type Counterparty {
  name: String!
  entityId: String
  type: String!
  website: String
  logoUrl: String
  confidenceLevel: String
}

"""A recurring transaction stream (subscription, paycheck, etc.)."""
type TransactionStream {
  streamId: ID!
  accountId: ID!
  transactionIds: [ID!]!
  description: String!
  merchantName: String
  firstDate: Date!
  lastDate: Date!
  frequency: String!
  transactionAmounts: StreamAmounts!
  category: [String!]!
  categoryId: String!
  isActive: Boolean!
  status: String!
  isUserModified: Boolean
  lastUserModifiedDatetime: DateTime
  personalFinanceCategory: PersonalFinanceCategory
}

"""Amount statistics for a recurring transaction stream."""
type StreamAmounts {
  amount: Float!
  isoCurrencyCode: String
  unofficialCurrencyCode: String
}

"""A transaction enrichment category."""
type Category {
  categoryId: ID!
  group: String!
  hierarchy: [String!]!
}

# ─────────────────────────────────────────────
# Income
# ─────────────────────────────────────────────

"""Wrapper for income verification results."""
type IncomeVerification {
  itemId: ID!
  incomeVerificationId: ID!
  status: IncomeVerificationStatus!
}

"""Payroll-sourced income data."""
type PayrollIncome {
  accountId: ID
  payFrequency: String
  payDate: Date
  payPeriodStartDate: Date
  payPeriodEndDate: Date
  grossEarnings: Float
  netEarnings: Float
  employerName: String
  employerAddress: IdentityAddressData
}

"""Bank-transaction-derived income data."""
type BankIncome {
  bankIncomeId: ID!
  generatedTime: DateTime!
  daysRequested: Int!
  items: [BankIncomeItem!]!
  warnings: [BankIncomeWarning!]
}

"""Income data for a single Plaid Item within a bank income report."""
type BankIncomeItem {
  itemId: ID!
  bankIncomeSources: [BankIncomeSource!]!
