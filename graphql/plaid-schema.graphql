}

"""A single identified income source within bank transactions."""
type BankIncomeSource {
  incomeSourceId: ID!
  incomeDescription: String!
  incomeCategory: String!
  incomeAmount: [BankIncomeAmount!]!
  startDate: Date
  endDate: Date
  payFrequency: String
