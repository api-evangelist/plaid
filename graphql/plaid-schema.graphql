# ─────────────────────────────────────────────
# Signal (ACH Risk Scoring)
# ─────────────────────────────────────────────

"""Plaid Signal evaluation response for an ACH transaction."""
type SignalEvaluateResponse {
  requestId: String!
  scores: SignalScores!
  core: SignalCore!
  ruleResults: SignalRuleResults
  warnings: [SignalWarning!]
}

"""Risk scores from Signal evaluation."""
type SignalScores {
  customerInitiatedReturnRisk: CustomerReturnRisk
  bankInitiatedReturnRisk: BankReturnRisk
}

"""Customer-initiated return risk score."""
type CustomerReturnRisk {
  score: Int!
  riskTier: Int!
}

"""Bank-initiated return risk score."""
type BankReturnRisk {
  score: Int!
  riskTier: Int!
}

"""Core attributes used in Signal scoring."""
type SignalCore {
  returnRiskBand: Int
}

"""Results of custom rules applied in Signal."""
type SignalRuleResults {
  predictedReturnPercentage: Float
}

"""A warning generated during Signal evaluation."""
type SignalWarning {
  warningType: String!
  warningCode: String!
  warningMessage: String!
}

# ─────────────────────────────────────────────
# Link / OAuth
# ─────────────────────────────────────────────

"""Hosted-Link delivery session."""
type LinkDeliverySession {
  linkDeliverySessionId: ID!
  createdAt: DateTime!
  completedAt: DateTime
  status: String!
  linkToken: String!
}

# ─────────────────────────────────────────────
# Query Root
# ─────────────────────────────────────────────

type Query {
  """Get metadata about a Plaid Item."""
  item(accessToken: String!): Item

  """List all accounts for a Plaid Item."""
  accounts(accessToken: String!): [Account!]!

  """Get real-time balances for all accounts linked to an Item."""
  balance(accessToken: String!): Balance

  """Get identity/KYC data for accounts."""
  identity(accessToken: String!): [Account!]!

  """Get paginated transactions for an Item."""
  transactions(
    accessToken: String!
    startDate: Date!
    endDate: Date!
    accountIds: [ID!]
    count: Int
    offset: Int
  ): [Transaction!]!

  """Get recurring transaction streams for an Item."""
  transactionsRecurring(accessToken: String!, accountIds: [ID!]): TransactionRecurringResult!

  """Get all standard Plaid categories."""
  categories: [Category!]!

  """Get investment holdings for an Item."""
  investmentsHoldings(accessToken: String!, accountIds: [ID!]): InvestmentsHoldingsResult!

  """Get investment transactions for an Item."""
  investmentsTransactions(
    accessToken: String!
    startDate: Date!
    endDate: Date!
    accountIds: [ID!]
    count: Int
    offset: Int
  ): InvestmentsTransactionsResult!

  """Get liabilities (mortgage, student loans) for an Item."""
  liabilities(accessToken: String!): LiabilitiesResult!

  """Get an asset report by its token."""
  assetReport(assetReportToken: String!): AssetReport

  """Get a bank income report by its ID."""
  bankIncome(userToken: String!, bankIncomeId: ID!): BankIncome

  """Search for institutions by name or product."""
  institutionsSearch(
    query: String!
    products: [String!]
    countryCodes: [String!]!
    count: Int
    offset: Int
  ): InstitutionSearch!

  """Get a single institution by ID."""
  institution(institutionId: ID!, countryCodes: [String!]!): Institution

  """Get a Transfer by ID."""
  transfer(transferId: ID!): Transfer

  """List Transfers."""
  transfers(count: Int, offset: Int): [Transfer!]!

  """Get a TransferAuthorization by ID."""
  transferAuthorization(authorizationId: ID!): TransferAuthorization

  """Get a Beacon user by ID."""
  beaconUser(beaconUserId: ID!): BeaconUser

  """Get a Beacon report by ID."""
  beaconReport(beaconReportId: ID!): BeaconReport

  """Get an individual watchlist screening by ID."""
  watchlistScreening(watchlistScreeningId: ID!): IndividualWatchlistScreening

  """Get Signal evaluation for an ACH transaction."""
  signalEvaluate(
    accessToken: String!
    accountId: ID!
    clientTransactionId: String!
    amount: Float!
  ): SignalEvaluateResponse

  """Get a Link delivery session by ID."""
  linkDeliverySession(linkDeliverySessionId: ID!): LinkDeliverySession
}

# ─────────────────────────────────────────────
# Composite result types
# ─────────────────────────────────────────────

"""Result of a recurring transactions query."""
type TransactionRecurringResult {
  inflowStreams: [TransactionStream!]!
  outflowStreams: [TransactionStream!]!
  updatedDatetime: DateTime!
  requestId: String!
}

"""Result of an investments holdings query."""
type InvestmentsHoldingsResult {
  accounts: [Account!]!
  holdings: [Holding!]!
  securities: [Security!]!
  item: Item!
  requestId: String!
}

"""Result of an investments transactions query."""
type InvestmentsTransactionsResult {
  accounts: [Account!]!
  securities: [Security!]!
  investmentTransactions: [InvestmentTransaction!]!
  totalInvestmentTransactions: Int!
  item: Item!
  requestId: String!
}

"""Result of a liabilities query."""
type LiabilitiesResult {
  accounts: [Account!]!
  item: Item!
  liabilities: LiabilitiesData!
  requestId: String!
}

"""Container for liability objects by sub-type."""
type LiabilitiesData {
  credit: [CreditCard!]
  mortgage: [Mortgage!]
  student: [Student!]
}

"""Credit-card liability details."""
type CreditCard {
  accountId: ID!
  aprs: [APR!]
  isOverdue: Boolean
  lastPaymentAmount: Float
  lastPaymentDate: Date
  lastStatementBalance: Float
  lastStatementIssueDate: Date
  minimumPaymentAmount: Float
  nextPaymentDueDate: Date
}

"""Annual percentage rate entry for a credit card."""
type APR {
  aprPercentage: Float!
  aprType: String!
  balanceSubjectToApr: Float
  interestChargeAmount: Float
}

# ─────────────────────────────────────────────
# Mutation Root
# ─────────────────────────────────────────────

type Mutation {
  """Create a Link token to initialise Plaid Link."""
  linkTokenCreate(
    clientUserId: String!
    clientName: String!
    products: [String!]
    countryCodes: [String!]!
    language: String!
    webhook: String
    accessToken: String
    accountFilters: [LinkTokenAccountFilter!]
  ): LinkToken!

  """Exchange a public token from Plaid Link for a long-lived access token."""
  itemPublicTokenExchange(publicToken: String!): AccessToken!

  """Remove an Item and revoke access."""
  itemRemove(accessToken: String!): Boolean!

  """Update the webhook URL for an Item."""
  itemWebhookUpdate(accessToken: String!, webhook: String!): Item!

  """Initiate a Transfer."""
  transferCreate(
    accessToken: String!
    accountId: ID!
    authorizationId: ID!
    description: String!
    network: TransferNetwork!
    amount: String!
    achClass: String
    userLegalName: String!
    userEmailAddress: String
  ): Transfer!

  """Authorize a proposed Transfer before creation."""
  transferAuthorizationCreate(
    accessToken: String!
    accountId: ID!
    type: TransferType!
    network: TransferNetwork!
    amount: String!
    achClass: String
    userLegalName: String!
  ): TransferAuthorization!

  """Cancel a pending Transfer."""
  transferCancel(transferId: ID!): Boolean!

  """Create a Beacon user for fraud network signaling."""
  beaconUserCreate(
    clientUserId: String!
    user: BeaconUserInput!
  ): BeaconUser!

  """Review a Beacon user."""
  beaconUserReview(beaconUserId: ID!, status: BeaconUserStatus!): BeaconUser!

  """Create a Beacon fraud report."""
  beaconReportCreate(
    beaconUserId: ID!
    type: String!
    fraudDate: Date
    fraudType: String!
  ): BeaconReport!

  """Create an individual watchlist screening."""
  watchlistScreeningCreate(
    watchlistProgramId: ID!
    legalName: String!
    dateOfBirth: Date
    documentNumber: String
    country: String
    clientUserId: String
  ): IndividualWatchlistScreening!

  """Create a Link delivery (Hosted Link) session."""
  linkDeliveryCreate(
    linkToken: String!
    options: LinkDeliveryOptions
  ): LinkDeliverySession!
}

# ─────────────────────────────────────────────
# Input types
# ─────────────────────────────────────────────

"""Input for creating a Beacon user."""
input BeaconUserInput {
  dateOfBirth: Date
  name: BeaconUserNameInput!
  address: AddressInput
  emailAddress: String
  phoneNumber: String
  ipAddress: String
  idNumber: BeaconUserIdNumberInput
}

"""Name input for a Beacon user."""
input BeaconUserNameInput {
  givenName: String!
  familyName: String!
}

"""Address input shared across mutations."""
input AddressInput {
  street: String
  city: String
  region: String
  postalCode: String
  country: String
}

"""Government ID input for a Beacon user."""
input BeaconUserIdNumberInput {
  value: String!
  type: String!
}

"""Options for a Link delivery session."""
input LinkDeliveryOptions {
  recipientEmailAddress: String
  senderEmailAddress: String
  senderEmailAddressAlias: String
}
