# ─────────────────────────────────────────────
# Transfer
# ─────────────────────────────────────────────

"""A Plaid Transfer object representing an ACH or RTP payment."""
type Transfer {
  id: ID!
  achClass: String
  accountId: ID!
  type: TransferType!
  user: TransferUser!
  amount: String!
  isoCurrencyCode: String!
  description: String!
