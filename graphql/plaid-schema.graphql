"""
Plaid GraphQL Schema (Conceptual)
Derived from the Plaid REST API — https://plaid.com/docs/api/
No native GraphQL endpoint exists; this schema models the Plaid data surface
for tooling, catalog enrichment, and documentation purposes.
"""

