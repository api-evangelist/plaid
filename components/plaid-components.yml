source: https://plaid.com/docs/link/
description: >-
  Plaid's embeddable, client-side UI component — Plaid Link — the drop-in module
  users interact with to connect their financial accounts. Link manages the
  entire authentication experience (credential validation, MFA, and bank OAuth
  flows) and is the only supported method for connecting accounts in Production.
  Distinct from the server-side SDK client libraries (plaid, plaid-python,
  plaid-java, etc.) which are catalogued in the Libraries reference. Grouped by
  platform family with the loader libraries that mount Link.
