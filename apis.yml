aid: plaid
name: Plaid
url: https://raw.githubusercontent.com/api-evangelist/plaid/refs/heads/main/apis.yml
description: Plaid is a US financial-technology company and data-network aggregator that provides an API
  platform for businesses to securely connect with their users' bank and financial accounts. Plaid acts
  as the interface between 12,000+ financial institutions and third-party applications, powering bank-account
  verification (Auth, Balance, Identity), transactions and enrichment, income and asset verification,
  lending data (Assets, Liabilities, Investments, Consumer Report/CRA), risk and fraud tooling (Signal,
  Beacon, Monitor watchlist screening, Identity Verification), and money movement (Transfer, Payment Initiation,
  Virtual Accounts). Developers integrate through Plaid Link, a self-serve dashboard, client credentials,
  per-Item access tokens, and a publicly published OpenAPI definition. In the US voluntary open-finance
  landscape Plaid is an aggregator, and it also operates Core Exchange, its FDX-aligned data-access API
  for data providers, positioning it for CFPB 1033 open-banking rules.
kind: company
