naftiko: 1.0.0-alpha2
info:
  label: Plaid wallet/ — Plaid
  description: 'Plaid wallet/ — Plaid. 6 operations. Lead operation: Plaid Create an e-wallet. Self-contained Naftiko capability
    covering one Plaid business surface.'
  tags:
  - Plaid
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
