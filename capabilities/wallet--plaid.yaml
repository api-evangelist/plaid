      path: /wallet/create
      operations:
      - name: walletcreate
        method: POST
        description: Plaid Create an e-wallet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: wallet-get
      path: /wallet/get
      operations:
      - name: walletget
        method: POST
        description: Plaid Fetch an e-wallet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: wallet-list
      path: /wallet/list
      operations:
      - name: walletlist
        method: POST
        description: Plaid Fetch a list of e-wallets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
