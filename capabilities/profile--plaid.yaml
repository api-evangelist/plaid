naftiko: 1.0.0-alpha2
info:
  label: Plaid profile/ — Plaid
  description: 'Plaid profile/ — Plaid. 2 operations. Lead operation: Plaid Check profile eligibility. Self-contained Naftiko
    capability covering one Plaid business surface.'
  tags:
  - Plaid
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PLAID_API_KEY: PLAID_API_KEY
capability:
  consumes:
  - type: http
    namespace: profile--plaid
    baseUri: https://production.plaid.com
    description: Plaid profile/ — Plaid business capability. Self-contained, no shared references.
    resources:
    - name: link-profile-eligibility-check
      path: /link/profile/eligibility/check
      operations:
      - name: linkprofileeligibilitycheck
        method: POST
        description: Plaid Check profile eligibility
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: profile-get
      path: /profile/get
      operations:
      - name: profileget
        method: POST
        description: Plaid Retrieve a Profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: profile--plaid-rest
    port: 8080
    description: REST adapter for Plaid profile/ — Plaid. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/link/profile/eligibility/check
      name: link-profile-eligibility-check
      description: REST surface for link-profile-eligibility-check.
      operations:
      - method: POST
        name: linkprofileeligibilitycheck
        description: Plaid Check profile eligibility
        call: profile--plaid.linkprofileeligibilitycheck
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/profile/get
      name: profile-get
      description: REST surface for profile-get.
      operations:
      - method: POST
        name: profileget
        description: Plaid Retrieve a Profile
        call: profile--plaid.profileget
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: profile--plaid-mcp
    port: 9090
    transport: http
    description: MCP adapter for Plaid profile/ — Plaid. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: plaid-check-profile-eligibility
      description: Plaid Check profile eligibility
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: profile--plaid.linkprofileeligibilitycheck
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: plaid-retrieve-profile
      description: Plaid Retrieve a Profile
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: profile--plaid.profileget
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
