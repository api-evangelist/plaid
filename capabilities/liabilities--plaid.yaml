naftiko: 1.0.0-alpha2
info:
  label: Plaid liabilities/ — Plaid
  description: 'Plaid liabilities/ — Plaid. 2 operations. Lead operation: Plaid Retrieve Liabilities data. Self-contained
    Naftiko capability covering one Plaid business surface.'
  tags:
  - Plaid
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PLAID_API_KEY: PLAID_API_KEY
capability:
  consumes:
  - type: http
    namespace: liabilities--plaid
    baseUri: https://production.plaid.com
    description: Plaid liabilities/ — Plaid business capability. Self-contained, no shared references.
    resources:
    - name: liabilities-get
      path: /liabilities/get
      operations:
      - name: liabilitiesget
        method: POST
        description: Plaid Retrieve Liabilities data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: processor-liabilities-get
      path: /processor/liabilities/get
      operations:
      - name: processorliabilitiesget
        method: POST
        description: Plaid Retrieve Liabilities data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: liabilities--plaid-rest
    port: 8080
    description: REST adapter for Plaid liabilities/ — Plaid. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/liabilities/get
      name: liabilities-get
      description: REST surface for liabilities-get.
      operations:
      - method: POST
        name: liabilitiesget
        description: Plaid Retrieve Liabilities data
        call: liabilities--plaid.liabilitiesget
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/processor/liabilities/get
      name: processor-liabilities-get
      description: REST surface for processor-liabilities-get.
      operations:
      - method: POST
        name: processorliabilitiesget
        description: Plaid Retrieve Liabilities data
        call: liabilities--plaid.processorliabilitiesget
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: liabilities--plaid-mcp
    port: 9090
    transport: http
    description: MCP adapter for Plaid liabilities/ — Plaid. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: plaid-retrieve-liabilities-data
      description: Plaid Retrieve Liabilities data
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: liabilities--plaid.liabilitiesget
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: plaid-retrieve-liabilities-data-2
      description: Plaid Retrieve Liabilities data
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: liabilities--plaid.processorliabilitiesget
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
